<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statistike — Gradbišče 1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-title"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 18a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v2z"/><path d="M10 10V5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v5"/><path d="M4 15v-3a8 8 0 0 1 16 0v3"/></svg> Gradbišče 1</a>
  <div class="navbar-links">
    <a href="index.html"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Timer</a>
    <a href="davcni-kalkulator.html"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="2" width="16" height="20" rx="2"/><rect x="8" y="6" width="8" height="4" rx="1"/><circle cx="8" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="14" r="1" fill="currentColor" stroke="none"/><circle cx="8" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="18" r="1" fill="currentColor" stroke="none"/></svg> Davčni kalkulator</a>
  </div>
</nav>

<!-- Zavihki -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="ure"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Ure</button>
  <button class="tab-btn" data-tab="stroski"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg> Stroški</button>
</div>

<div class="container">

  <!-- ══ ZAVIHEK: URE ══ -->
  <div id="tabUre">

    <div class="filter-bar" id="filterBar">
      <button class="filter-btn" data-filter="week">Ta teden</button>
      <button class="filter-btn" data-filter="month">Ta mesec</button>
      <button class="filter-btn" data-filter="year">Letos</button>
      <button class="filter-btn active" data-filter="all">Vse</button>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label">Skupno ur</div><div class="stat-value skeleton skeleton-text" style="width:60%"></div></div>
      <div class="stat-card"><div class="stat-label">Aktivnih članov</div><div class="stat-value skeleton skeleton-text" style="width:40%"></div></div>
      <div class="stat-card"><div class="stat-label">Delovnih dni</div><div class="stat-value skeleton skeleton-text" style="width:50%"></div></div>
      <div class="stat-card"><div class="stat-label">Povprečno</div><div class="stat-value skeleton skeleton-text" style="width:55%"></div></div>
    </div>

    <div class="chart-card">
      <h2>Ure po članu</h2>
      <div class="chart-wrap" id="chartByMemberWrap">
        <div class="skeleton skeleton-chart"></div>
      </div>
    </div>

    <div class="chart-card">
      <h2>Ure po dnevih</h2>
      <div class="chart-wrap" id="chartByDayWrap">
        <div class="skeleton skeleton-chart"></div>
      </div>
    </div>

    <div class="table-card" id="tableCard">
      <h2>Vsi vnosi</h2>
      <div class="skeleton skeleton-chart" style="margin:1rem"></div>
    </div>

  </div>

  <!-- ══ ZAVIHEK: STROŠKI ══ -->
  <div id="tabStroski" hidden>

    <div class="filter-bar" id="filterBarStroski">
      <button class="filter-btn" data-filter="week">Ta teden</button>
      <button class="filter-btn" data-filter="month">Ta mesec</button>
      <button class="filter-btn active" data-filter="all">Vse</button>
    </div>

    <div class="stats-grid" id="statsGridStroski">
      <div class="stat-card"><div class="stat-label">Skupaj</div><div class="stat-value skeleton skeleton-text" style="width:60%"></div></div>
      <div class="stat-card"><div class="stat-label">Vnosov</div><div class="stat-value skeleton skeleton-text" style="width:40%"></div></div>
      <div class="stat-card"><div class="stat-label">Največji strošek</div><div class="stat-value skeleton skeleton-text" style="width:50%"></div></div>
      <div class="stat-card"><div class="stat-label">Povprečno</div><div class="stat-value skeleton skeleton-text" style="width:55%"></div></div>
    </div>

    <div class="chart-card">
      <h2>Stroški po kategoriji</h2>
      <div class="chart-wrap" id="chartByKatWrap">
        <div class="skeleton skeleton-chart"></div>
      </div>
    </div>

    <div class="chart-card">
      <h2>Stroški po osebi</h2>
      <div class="chart-wrap" id="chartByOsebaWrap">
        <div class="skeleton skeleton-chart"></div>
      </div>
    </div>

    <div class="table-card" id="tableCardStroski">
      <h2>Vsi stroški</h2>
      <div class="skeleton skeleton-chart" style="margin:1rem"></div>
    </div>

  </div>

</div>

<script src="dashboard.js"></script>
</body>
</html>
