<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 Statistike — Gradbišče 1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <h1>📊 Statistike — Gradbišče 1</h1>
  <a href="index.html">⏱ Timer</a>
</nav>

<div class="container">

  <!-- Filter -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn" data-filter="week">Ta teden</button>
    <button class="filter-btn" data-filter="month">Ta mesec</button>
    <button class="filter-btn" data-filter="year">Letos</button>
    <button class="filter-btn active" data-filter="all">Vse</button>
  </div>

  <!-- Stat cards -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-value skeleton skeleton-text" style="width:60%;margin:auto"></div><div class="stat-label">Skupno ur</div></div>
    <div class="stat-card"><div class="stat-value skeleton skeleton-text" style="width:40%;margin:auto"></div><div class="stat-label">Aktivnih članov</div></div>
    <div class="stat-card"><div class="stat-value skeleton skeleton-text" style="width:50%;margin:auto"></div><div class="stat-label">Delovnih dni</div></div>
    <div class="stat-card"><div class="stat-value skeleton skeleton-text" style="width:55%;margin:auto"></div><div class="stat-label">Povprečno ur/dan</div></div>
  </div>

  <!-- Chart 1 -->
  <div class="chart-card">
    <h2>Ure po članu</h2>
    <div class="chart-wrap" id="chartByMemberWrap">
      <div class="skeleton skeleton-chart"></div>
    </div>
  </div>

  <!-- Chart 2 -->
  <div class="chart-card">
    <h2>Ure po dnevih</h2>
    <div class="chart-wrap" id="chartByDayWrap">
      <div class="skeleton skeleton-chart"></div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card" id="tableCard">
    <h2>Vsi vnosi</h2>
    <div class="skeleton skeleton-chart"></div>
  </div>

</div>

<script src="dashboard.js"></script>
</body>
</html>
